version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: srm_curiousbees_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: srm_curiousbees_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srm_curiousbees_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: srm_curiousbees_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: srm_curiousbees_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/srm_curiousbees_db?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/srm_curiousbees_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEVELOPMENT_MODE: "true"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_DEVELOPMENT_MODE: "true"
    container_name: srm_curiousbees_web
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_DEVELOPMENT_MODE: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:latest
    container_name: srm_curiousbees_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai-worker
    container_name: srm_curiousbees_ai_worker
    restart: always
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=curious_bees_collection
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
